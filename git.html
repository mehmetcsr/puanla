<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('ID') || '01';

        if (kartID.length === 1) {
            kartID = "0" + kartID;
        }

        // CountAPI hit isteği (no-cors modunda hızlı istek)
        function sayaciArtirAndYonlendir() {
            const hedef = `index.html?ID=${kartID}`;
            
            // API isteğini atıyoruz
            fetch(`https://api.countapi.xyz/hit/mehmetcsr-puanla/${kartID}`, { mode: 'cors' })
                .then(res => res.json())
                .then(data => {
                    console.log("Yeni Sayı:", data.value);
                    window.location.href = hedef;
                })
                .catch(err => {
                    console.log("Hata:", err);
                    window.location.href = hedef;
                });

            // Yönlendirmenin takılmaması için maksimum 800ms güvenlik zamanlayıcısı
            setTimeout(() => {
                window.location.href = hedef;
            }, 800);
        }

        window.onload = sayaciArtirAndYonlendir;
    </script>
</head>
<body style="background:#ffffff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <p style="color:#64748b; font-weight:600;">Yönlendiriliyorsunuz...</p>
</body>
</html>
