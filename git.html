<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
        const SUPABASE_URL = "https://ajvaubkvptdrxccjpapb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_WEkoMrOEP5p67wsOCbkshw_ju33ClTn";

        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('id') || urlParams.get('ID') || '01';

        if (kartID.length === 1) {
            kartID = "0" + kartID;
        }

        async function yonlendir() {
            const hedef = `index.html?id=${kartID}`;

            try {
                const ts = Date.now();
                // 1. Kart var mı kontrol et
                const getRes = await fetch(`${SUPABASE_URL}/rest/v1/sayac?id=eq.${kartID}&select=toplam&_t=${ts}`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const data = await getRes.json();

                if (Array.isArray(data) && data.length > 0) {
                    // Kayıt varsa: Sayıyı +1 yapıp PATCH atıyoruz
                    const yeniToplam = (data[0].toplam || 0) + 1;
                    await fetch(`${SUPABASE_URL}/rest/v1/sayac?id=eq.${kartID}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ toplam: yeniToplam })
                    });
                } else {
                    // Kayıt yoksa: Yeni kart satırı açıyoruz
                    await fetch(`${SUPABASE_URL}/rest/v1/sayac`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ id: kartID, toplam: 1 })
                    });
                }
            } catch (err) {
                console.error("Hata:", err);
            } finally {
                // Her halükarda yönlendir
                window.location.href = hedef;
            }
        }

        window.onload = yonlendir;
    </script>
</head>
<body style="background:#ffffff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <p style="color:#64748b; font-weight:600;">Yönlendiriliyorsunuz...</p>
</body>
</html>
