<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
        const SUPABASE_URL = "https://ajvaubkvptdrxccjpapb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_WEkoMrOEP5p67wsOCbkshw_ju33ClTn";

        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('id') || urlParams.get('ID') || '01';

        if (kartID.length === 1) {
            kartID = "0" + kartID;
        }

        async function yonlendir() {
            const hedef = `index.html?id=${kartID}`;

            try {
                // Supabase veritabanı fonksiyonunu doğrudan tetikliyoruz
                await fetch(`${SUPABASE_URL}/rest/v1/rpc/kart_artir`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ k_id: kartID }),
                    keepalive: true // Yönlendirme olsa bile arka planda isteği tamamlar!
                });
            } catch (err) {
                console.error("Hata:", err);
            } finally {
                // Her durumda yönlendir
                window.location.href = hedef;
            }
        }

        window.onload = yonlendir;
    </script>
</head>
<body style="background:#ffffff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <p style="color:#64748b; font-weight:600;">Yönlendiriliyorsunuz...</p>
</body>
</html>
