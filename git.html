<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('ID') || '01';

        if (kartID.length === 1) {
            kartID = "0" + kartID;
        }

        function sayaciArtirAndYonlendir() {
            const hedef = `index.html?ID=${kartID}`;

            fetch(`https://api.countapi.xyz/hit/mehmetcsr-puanla/${kartID}`)
                .then(res => res.json())
                .then(data => {
                    window.location.href = hedef;
                })
                .catch(err => {
                    window.location.href = hedef;
                });

            setTimeout(() => {
                window.location.href = hedef;
            }, 800);
        }

        window.onload = sayaciArtirAndYonlendir;
    </script>
</head>
<body style="background:#ffffff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <p style="color:#64748b; font-weight:600;">Yönlendiriliyorsunuz...</p>
</body>
</html>
