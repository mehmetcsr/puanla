<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
        const SUPABASE_URL = "https://ajvaubkvptdrxccjpapb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_WEkoMrOEP5p67wsOCbkshw_ju33ClTn";

        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('id') || urlParams.get('ID') || '01';

        if (kartID.length === 1) {
            kartID = "0" + kartID;
        }

        async function yonlendir() {
            const hedef = `index.html?id=${kartID}`;

            try {
                // 1. Mevcut sayıyı çek
                const res = await fetch(`${SUPABASE_URL}/rest/v1/sayac?id=eq.${kartID}&select=toplam`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await res.json();

                if (data && data.length > 0) {
                    // Kayıt varsa sayıyı +1 artır (UPSERT / POST)
                    const yeniToplam = data[0].toplam + 1;
                    await fetch(`${SUPABASE_URL}/rest/v1/sayac?id=eq.${kartID}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({ toplam: yeniToplam })
                    });
                } else {
                    // İlk defa tıklanıyorsa yeni satır oluştur (ID ve Toplam = 1)
                    await fetch(`${SUPABASE_URL}/rest/v1/sayac`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({ id: kartID, toplam: 1 })
                    });
                }
            } catch (e) {
                console.log("Hata:", e);
            }

            // Sayacı işledikten sonra hemen hedefe git
            window.location.href = hedef;
        }

        window.onload = yonlendir;
    </script>
</head>
<body style="background:#ffffff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <p style="color:#64748b; font-weight:600;">Yönlendiriliyorsunuz...</p>
</body>
</html>
