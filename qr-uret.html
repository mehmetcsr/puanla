<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehmetcsr QR Kod Üretici & İndirici Panel</title>
    <!-- QR Kod Oluşturma Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus {
            border-color: #007bff;
        }
        .btn-create {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-create:hover {
            background-color: #0056b3;
        }
        .btn-download {
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            display: none; /* İlk başta gizli, QR üretilince açılacak */
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            margin-top: 15px;
        }
        .btn-download:hover {
            background-color: #218838;
        }
        #qrcode {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }
        #qrcode img {
            border: 4px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            padding: 10px;
            background: #fff;
        }
        .info-box {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Kod Üretici & İndirici</h2>
    <p>Sınırsız, reklamsız ve bilgisayara doğrudan indirme özellikli panel.</p>
    
    <input type="text" id="urlInput" placeholder="ID Girin (Örn: 01)" value="01">
    <button class="btn-create" onclick="generateQR()">QR Kod Oluştur</button>
    
    <div id="qrcode"></div>
    
    <!-- İndirme Butonu -->
    <a id="downloadBtn" class="btn-download" href="#" download="qr01.png">Görseli Bilgisayara İndir (qr01.png)</a>

    <div class="info-box">
        <strong>Nasıl Kullanılır?</strong> ID kısmına kart numarasını yazıp "Oluştur" deyin. Ardından yeşil butona basarak doğrudan baskıya hazır PNG dosyasını indirin.
    </div>
</div>

<script>
    // QR kod nesnesini yüksek çözünürlük için 500x500 yapıyoruz (Baskıda çamur gibi durmasın diye)
    var qrcode = new QRCode(document.getElementById("qrcode"), {
        width: 500,
        height: 500,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    function generateQR() {
        var idVal = document.getElementById("urlInput").value.trim();
        if(idVal === "") {
            alert("Lütfen bir ID girin!");
            return;
        }
        
        // Link yapısı
        var tamLink = "https://mehmetcsr.github.io/puanla/?id=" + idVal;
        
        // QR Kodu yenile
        qrcode.clear();
        qrcode.makeCode(tamLink);
        
        // QR kod görselinin arka planda oluşması için 200 milisaniye süre tanıyoruz
        setTimeout(function() {
            var qrImg = document.querySelector("#qrcode img");
            if(qrImg) {
                var downloadBtn = document.getElementById("downloadBtn");
                // İndirme butonunun linkini ve dosya adını güncelliyoruz
                downloadBtn.href = qrImg.src;
                downloadBtn.download = "qr" + idVal + ".png";
                downloadBtn.innerText = "Görseli Bilgisayara İndir (qr" + idVal + ".png)";
                downloadBtn.style.display = "block";
            }
        }, 200);
    }

    // Sayfa ilk açıldığında otomatik 01'i hazır etsin
    generateQR();
</script>

</body>
</html>
