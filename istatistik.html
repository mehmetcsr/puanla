<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masa QR Analiz Paneli</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            text-align: center;
            width: 320px;
            border: 1px solid #e2e8f0;
        }
        .baslik { font-size: 13px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .sayac { font-size: 56px; font-weight: 900; color: #4285F4; margin: 15px 0; }
        .rozet { background: #dcfce7; color: #15803d; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-block; }
        .buton { margin-top: 20px; background: #4285F4; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="kart">
        <div class="baslik">Masa QR Okunma Sayısı</div>
        <div class="sayac" id="sayi">0</div>
        <div class="rozet">🟢 Canlı Veri</div>
        <button class="buton" onclick="veriyiCek()">Sayfayı Yenile</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('ID') || '01';
        if (kartID.length === 1) kartID = "0" + kartID;

        function veriyiCek() {
            fetch(`https://counterapi.com/api/mehmetcsr-puanla/get/${kartID}`)
                .then(res => res.json())
                .then(data => {
                    // CounterAPI yanıt yapısı
                    document.getElementById('sayi').innerText = data.value || data.count || 0;
                })
                .catch(() => {
                    document.getElementById('sayi').innerText = "0";
                });
        }

        veriyiCek();
    </script>
</body>
</html>
