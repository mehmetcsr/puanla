<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masa QR Analiz Paneli</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            text-align: center;
            width: 320px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }
        .baslik { font-size: 13px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .kart-id { font-size: 15px; color: #1e293b; font-weight: 700; margin-top: 4px; }
        .sayac { font-size: 56px; font-weight: 900; color: #4285F4; margin: 15px 0; }
        .rozet { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-block; }
        .rozet.canli { background: #dcfce7; color: #15803d; }
        .rozet.hata { background: #fee2e2; color: #b91c1c; }
        .buton { margin-top: 20px; background: #4285F4; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; font-size: 14px; }
        .buton:hover { background: #3367d6; }
        .not { margin-top: 14px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="kart">
        <div class="baslik">Masa QR Okunma Sayısı</div>
        <div class="kart-id" id="kartBaslik">...</div>
        <div class="sayac" id="sayi">...</div>
        <div class="rozet canli" id="rozet">🟢 Canlı Veri</div>
        <button class="buton" onclick="veriyiCek()">Sayfayı Yenile</button>
        <div class="not">Bu sayfayı açmak sayacı artırmaz, sadece mevcut değeri okur.</div>
    </div>

    <script>
        const SAYAC_NAMESPACE = "mehmetcsr-puanla";

        const urlParams = new URLSearchParams(window.location.search);
        let kartID = urlParams.get('id') || urlParams.get('ID') || '01';
        if (kartID.length === 1) kartID = "0" + kartID;
        const sayacAnahtari = "kart-" + kartID;

        document.getElementById('kartBaslik').innerText = "Kart: " + kartID;

        async function veriyiCek() {
            const sayiEl = document.getElementById('sayi');
            const rozetEl = document.getElementById('rozet');
            sayiEl.innerText = "...";
            try {
                const res = await fetch(`https://abacus.jasoncameron.dev/get/${SAYAC_NAMESPACE}/${sayacAnahtari}`);

                if (res.status === 404) {
                    sayiEl.innerText = "0";
                    rozetEl.className = "rozet canli";
                    rozetEl.innerText = "🟢 Henüz okutulmamış";
                    return;
                }
                if (!res.ok) throw new Error("HTTP " + res.status);

                const data = await res.json();
                sayiEl.innerText = data.value !== undefined ? data.value : "0";
                rozetEl.className = "rozet canli";
                rozetEl.innerText = "🟢 Canlı Veri";
            } catch (e) {
                console.error("Sayaç okunamadı:", e);
                sayiEl.innerText = "0";
                rozetEl.className = "rozet hata";
                rozetEl.innerText = "🔴 Veri alınamadı";
            }
        }

        veriyiCek();
    </script>
</body>
</html>
