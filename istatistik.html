<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Puanla! - Dükkan Tarama İstatistikleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(66,133,244,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(234,67,53,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(52,168,83,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 30%, rgba(251,188,5,0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .header-logo .g1 { color: #4285f4; }
        .header-logo .g2 { color: #ea4335; }
        .header-logo .g3 { color: #fbbc05; }
        .header-logo .g4 { color: #34a853; }

        .header-sub {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        .header-sub span {
            color: #94a3b8;
            font-weight: 600;
        }

        /* ── Özet Kartları ── */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(30,41,59,0.9), rgba(30,41,59,0.6));
            border: 1px solid rgba(148,163,184,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-3px);
            border-color: rgba(148,163,184,0.2);
        }

        .summary-card.blue   { border-top: 3px solid #4285f4; }
        .summary-card.green  { border-top: 3px solid #34a853; }
        .summary-card.yellow { border-top: 3px solid #fbbc05; }

        .summary-number {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .summary-label {
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── Yenile Butonu ── */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .btn-refresh {
            padding: 10px 20px;
            border: 2px solid rgba(148,163,184,0.15);
            border-radius: 12px;
            background: rgba(30,41,59,0.8);
            color: #94a3b8;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-refresh:hover {
            border-color: rgba(148,163,184,0.3);
            color: #e2e8f0;
            transform: translateY(-2px);
        }

        .btn-refresh.spinning svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ── Dükkan Kartları ── */
        .dukkan-listesi {
            display: grid;
            gap: 16px;
        }

        .dukkan-kart {
            background: linear-gradient(135deg, rgba(30,41,59,0.95), rgba(30,41,59,0.6));
            border: 1px solid rgba(148,163,184,0.08);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(16px);
            position: relative;
            overflow: hidden;
        }

        .dukkan-kart.show {
            opacity: 1;
            transform: translateY(0);
        }

        .dukkan-kart:hover {
            border-color: rgba(148,163,184,0.2);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }

        /* Sol renk şeridi */
        .dukkan-kart::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 4px;
            height: 100%;
            border-radius: 20px 0 0 20px;
        }

        .dukkan-kart.c-blue::before   { background: #4285f4; }
        .dukkan-kart.c-red::before    { background: #ea4335; }
        .dukkan-kart.c-yellow::before { background: #fbbc05; }
        .dukkan-kart.c-green::before  { background: #34a853; }

        .dukkan-ust {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .dukkan-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .dukkan-badge::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        }

        .c-blue .dukkan-badge   { background: #4285f4; }
        .c-red .dukkan-badge    { background: #ea4335; }
        .c-yellow .dukkan-badge { background: #f59e0b; }
        .c-green .dukkan-badge  { background: #34a853; }

        .dukkan-baslik {
            flex: 1;
            min-width: 0;
        }

        .dukkan-isim {
            font-size: 17px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 3px;
        }

        .dukkan-tip {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dukkan-tip .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            display: inline-block;
        }

        .c-blue .dukkan-tip .dot   { background: #4285f4; }
        .c-red .dukkan-tip .dot    { background: #ea4335; }
        .c-yellow .dukkan-tip .dot { background: #fbbc05; }
        .c-green .dukkan-tip .dot  { background: #34a853; }

        /* Sayaç alanı */
        .dukkan-sayac {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15,23,42,0.5);
            border-radius: 14px;
            padding: 16px 20px;
        }

        .sayac-sol {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .sayac-rakam {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        .c-blue .sayac-rakam   { color: #4285f4; }
        .c-red .sayac-rakam    { color: #ea4335; }
        .c-yellow .sayac-rakam { color: #fbbc05; }
        .c-green .sayac-rakam  { color: #34a853; }

        .sayac-etiket {
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }

        .sayac-link {
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 11px;
            color: #475569;
            text-align: right;
            direction: rtl;
        }

        .sayac-link a {
            color: #475569;
            text-decoration: none;
            transition: color 0.2s;
        }

        .sayac-link a:hover { color: #94a3b8; }

        /* ── Yükleniyor ── */
        .yukleniyor {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }

        .yukleniyor-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(148,163,184,0.1);
            border-top: 3px solid #4285f4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        /* ── Boş ── */
        .bos-durum {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
            font-size: 15px;
            font-weight: 500;
        }

        /* ── Footer ── */
        .footer-info {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #475569;
            font-weight: 500;
        }

        .footer-info .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #34a853;
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .summary-row { grid-template-columns: 1fr; gap: 10px; }
            .summary-number { font-size: 28px; }
            .dukkan-sayac { flex-direction: column; align-items: flex-start; gap: 10px; }
            .sayac-link { max-width: 100%; text-align: left; direction: ltr; }
            .sayac-rakam { font-size: 34px; }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-logo">
            <span class="g1">P</span><span class="g2">u</span><span class="g3">a</span><span class="g4">n</span><span class="g1">l</span><span class="g2">a</span><span class="g3">!</span>
        </div>
        <div class="header-sub">Dükkan Bazlı <span>Tarama İstatistikleri</span></div>
    </div>

    <!-- Özet -->
    <div class="summary-row">
        <div class="summary-card blue">
            <div class="summary-number" id="toplamTarama">—</div>
            <div class="summary-label">Toplam Tarama</div>
        </div>
        <div class="summary-card green">
            <div class="summary-number" id="toplamDukkan">—</div>
            <div class="summary-label">Toplam Dükkan</div>
        </div>
        <div class="summary-card yellow">
            <div class="summary-number" id="enPopuler">—</div>
            <div class="summary-label">En Çok Taranan</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="btn-refresh" id="yenileBtn" onclick="verileriYukle()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
            Yenile
        </button>
    </div>

    <!-- Dükkan Listesi -->
    <div class="dukkan-listesi" id="dukkanListesi">
        <div class="yukleniyor">
            <div class="yukleniyor-spinner"></div>
            Dükkan verileri yükleniyor...
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-info" id="footerInfo" style="display:none;">
        <span class="live-dot"></span>
        Son güncelleme: <span id="sonGuncelleme"></span>
    </div>
</div>

<script>
    const RENK_SINIFLAR = ['c-blue', 'c-red', 'c-yellow', 'c-green'];
    const NAMESPACE = 'mehmetcsr-puanla';

    // GitHub Pages üzerindeki index.html'den dükkan linklerini çek
    const INDEX_URL = 'https://raw.githubusercontent.com/mehmetcsr/puanla/main/index.html';

    window.addEventListener('DOMContentLoaded', verileriYukle);

    async function verileriYukle() {
        const yenileBtn = document.getElementById('yenileBtn');
        yenileBtn.classList.add('spinning');

        try {
            // 1) index.html'den dükkan linklerini parse et
            const dukkanlar = await dukkanlariCek();

            if (dukkanlar.length === 0) {
                document.getElementById('dukkanListesi').innerHTML =
                    '<div class="bos-durum">Henüz kayıtlı dükkan bulunamadı.</div>';
                yenileBtn.classList.remove('spinning');
                return;
            }

            // 2) Her dükkan için sayaç verisini çek (paralel)
            const sayacSonuclari = await Promise.allSettled(
                dukkanlar.map(d => sayacGetir(d.id))
            );

            // Verileri birleştir
            const kartVerileri = dukkanlar.map((d, i) => ({
                id: d.id,
                link: d.link,
                sayi: sayacSonuclari[i].status === 'fulfilled' ? sayacSonuclari[i].value : 0
            }));

            // Büyükten küçüğe sırala
            kartVerileri.sort((a, b) => b.sayi - a.sayi);

            // 3) Özet
            const toplam = kartVerileri.reduce((t, k) => t + k.sayi, 0);
            const enCok = kartVerileri.length > 0 && kartVerileri[0].sayi > 0 ? kartVerileri[0] : null;

            animasyonluSayi('toplamTarama', toplam);
            animasyonluSayi('toplamDukkan', kartVerileri.length);
            document.getElementById('enPopuler').textContent =
                enCok ? `#${enCok.id}` : '—';

            // 4) Kart listesini render et
            renderDukkanlar(kartVerileri);

            // Footer
            document.getElementById('footerInfo').style.display = 'block';
            document.getElementById('sonGuncelleme').textContent = new Date().toLocaleString('tr-TR');

        } catch (err) {
            console.error('Veri yükleme hatası:', err);
            document.getElementById('dukkanListesi').innerHTML =
                '<div class="bos-durum">Veriler yüklenirken hata oluştu. Lütfen tekrar deneyin.</div>';
        }

        setTimeout(() => yenileBtn.classList.remove('spinning'), 400);
    }

    async function dukkanlariCek() {
        const resp = await fetch(INDEX_URL + '?t=' + Date.now(), { cache: 'no-store' });
        const html = await resp.text();

        // "const dukkanLinkleri = { ... };" bloğunu bul ve parse et
        const basla = html.indexOf('const dukkanLinkleri = {');
        if (basla === -1) return [];

        const bitis = html.indexOf('};', basla);
        if (bitis === -1) return [];

        // Obje kısmını çıkar
        const objeStr = html.substring(basla + 'const dukkanLinkleri = '.length, bitis + 1);

        // JSON'a çevir: tek tırnakları çift tırnak yap, trailing comma temizle
        let jsonStr = objeStr
            .replace(/'/g, '"')
            .replace(/,\s*}/g, '}');

        try {
            const obj = JSON.parse(jsonStr);
            return Object.entries(obj).map(([id, link]) => ({ id, link }));
        } catch (e) {
            // Regex ile parse et (fallback)
            const regex = /"(\w+)":\s*"(.*?)"/g;
            const sonuclar = [];
            let eslesme;
            while ((eslesme = regex.exec(objeStr)) !== null) {
                sonuclar.push({ id: eslesme[1], link: eslesme[2] });
            }
            return sonuclar;
        }
    }

    async function sayacGetir(id) {
        try {
            const resp = await fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/${id}`, {
                cache: 'no-store'
            });
            if (resp.ok) {
                const data = await resp.json();
                return data.count || 0;
            }
            return 0;
        } catch {
            return 0;
        }
    }

    function linkTipiTespit(link) {
        if (link.includes('google.com/local/writereview') || link.includes('google.com/maps')) {
            return { tip: 'Google Yorum', ikon: '⭐' };
        }
        if (link.includes('youtube.com') || link.includes('youtu.be')) {
            return { tip: 'YouTube Video', ikon: '▶️' };
        }
        if (link.includes('instagram.com')) {
            return { tip: 'Instagram', ikon: '📷' };
        }
        if (link.includes('wa.me') || link.includes('whatsapp.com')) {
            return { tip: 'WhatsApp', ikon: '💬' };
        }
        return { tip: 'Web Sitesi', ikon: '🔗' };
    }

    function kisaltLink(link) {
        try {
            const url = new URL(link);
            let gosterilen = url.hostname.replace('www.', '');
            if (url.pathname.length > 1) {
                gosterilen += url.pathname.substring(0, 25);
                if (url.pathname.length > 25) gosterilen += '…';
            }
            return gosterilen;
        } catch {
            return link.substring(0, 40) + '…';
        }
    }

    function renderDukkanlar(kartVerileri) {
        const liste = document.getElementById('dukkanListesi');
        liste.innerHTML = '';

        kartVerileri.forEach((kart, index) => {
            const renkSinif = RENK_SINIFLAR[index % RENK_SINIFLAR.length];
            const { tip, ikon } = linkTipiTespit(kart.link);
            const kisaLink = kisaltLink(kart.link);

            const div = document.createElement('div');
            div.className = `dukkan-kart ${renkSinif}`;
            div.innerHTML = `
                <div class="dukkan-ust">
                    <div class="dukkan-badge">${kart.id}</div>
                    <div class="dukkan-baslik">
                        <div class="dukkan-isim">Kart #${kart.id} — Dükkan</div>
                        <div class="dukkan-tip"><span class="dot"></span> ${ikon} ${tip}</div>
                    </div>
                </div>
                <div class="dukkan-sayac">
                    <div class="sayac-sol">
                        <div class="sayac-rakam">${kart.sayi.toLocaleString('tr-TR')}</div>
                        <div class="sayac-etiket">tarama</div>
                    </div>
                    <div class="sayac-link">
                        <a href="${kart.link}" target="_blank" title="${kart.link}">${kisaLink}</a>
                    </div>
                </div>
            `;
            liste.appendChild(div);

            setTimeout(() => div.classList.add('show'), 100 * index);
        });
    }

    function animasyonluSayi(elementId, hedef) {
        const el = document.getElementById(elementId);
        const baslangic = parseInt(el.textContent) || 0;
        const fark = hedef - baslangic;
        const sure = 800;
        const t0 = performance.now();

        function adim(t) {
            const gecen = t - t0;
            const ilerleme = Math.min(gecen / sure, 1);
            const easing = ilerleme === 1 ? 1 : 1 - Math.pow(2, -10 * ilerleme);
            el.textContent = Math.round(baslangic + fark * easing).toLocaleString('tr-TR');
            if (ilerleme < 1) requestAnimationFrame(adim);
        }

        requestAnimationFrame(adim);
    }
</script>

</body>
</html>
