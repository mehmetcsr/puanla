<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Puanla! - Kart İstatistiği</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(66,133,244,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(52,168,83,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(251,188,5,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .kart-sayfa {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        /* ── Logo ── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .logo-text .g1 { color: #4285f4; }
        .logo-text .g2 { color: #ea4335; }
        .logo-text .g3 { color: #fbbc05; }
        .logo-text .g4 { color: #34a853; }

        .logo-alt {
            font-size: 12px;
            color: #475569;
            font-weight: 500;
            margin-top: 4px;
        }

        /* ── Ana Kart ── */
        .ana-kart {
            background: linear-gradient(145deg, rgba(30,41,59,0.95), rgba(15,23,42,0.9));
            border: 1px solid rgba(148,163,184,0.1);
            border-radius: 24px;
            padding: 36px 28px;
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .ana-kart::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4285f4, #ea4335, #fbbc05, #34a853);
        }

        /* Badge */
        .kart-badge {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 28px;
            color: white;
            background: linear-gradient(135deg, #4285f4, #3b72db);
            box-shadow: 0 8px 30px rgba(66,133,244,0.35);
            position: relative;
        }

        .kart-badge::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
        }

        .kart-baslik {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .kart-tip {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .kart-tip .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #34a853;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Sayaç Alanı ── */
        .sayac-alan {
            background: rgba(15,23,42,0.6);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 24px;
        }

        .sayac-etiket {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #475569;
            margin-bottom: 8px;
        }

        .sayac-rakam {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 1;
            background: linear-gradient(135deg, #4285f4, #34a853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .sayac-alt {
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
        }

        /* ── Link Bilgisi ── */
        .link-bilgi {
            background: rgba(66,133,244,0.08);
            border: 1px solid rgba(66,133,244,0.15);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .link-ikon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(66,133,244,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .link-detay {
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .link-tip-text {
            font-size: 13px;
            font-weight: 700;
            color: #e2e8f0;
        }

        .link-url {
            font-size: 11px;
            color: #475569;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Yenile Butonu ── */
        .yenile-btn {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(148,163,184,0.12);
            border-radius: 14px;
            background: rgba(30,41,59,0.6);
            color: #94a3b8;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .yenile-btn:hover {
            border-color: rgba(148,163,184,0.25);
            color: #e2e8f0;
            transform: translateY(-2px);
        }

        .yenile-btn.spinning svg {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ── Son Güncelleme ── */
        .son-guncelleme {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #334155;
            font-weight: 500;
        }

        /* ── Hata Durumu ── */
        .hata-kutu {
            text-align: center;
            padding: 40px 20px;
        }

        .hata-ikon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .hata-baslik {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .hata-aciklama {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }

        /* ── Yükleniyor ── */
        .yukleniyor-spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(148,163,184,0.1);
            border-top: 3px solid #4285f4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .yukleniyor-text {
            font-size: 14px;
            color: #475569;
            font-weight: 500;
        }

        /* ── Otomatik Yenileme Bar ── */
        .oto-bar-wrap {
            margin-top: 16px;
            text-align: center;
        }

        .oto-bar {
            width: 100%;
            height: 3px;
            border-radius: 3px;
            background: rgba(148,163,184,0.1);
            overflow: hidden;
            margin-bottom: 6px;
        }

        .oto-bar-dolgu {
            height: 100%;
            background: linear-gradient(90deg, #4285f4, #34a853);
            border-radius: 3px;
            width: 0%;
            transition: width 1s linear;
        }

        .oto-bar-text {
            font-size: 10px;
            color: #334155;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="kart-sayfa">
    <div class="logo">
        <div class="logo-text">
            <span class="g1">P</span><span class="g2">u</span><span class="g3">a</span><span class="g4">n</span><span class="g1">l</span><span class="g2">a</span><span class="g3">!</span>
        </div>
        <div class="logo-alt">Kart Tarama İstatistiği</div>
    </div>

    <div class="ana-kart" id="anaKart">
        <!-- İçerik JS ile doldurulacak -->
        <div style="padding: 40px 0;">
            <div class="yukleniyor-spinner"></div>
            <div class="yukleniyor-text">Veriler yükleniyor...</div>
        </div>
    </div>

    <div class="son-guncelleme" id="sonGuncelleme"></div>

    <!-- Otomatik yenileme barı -->
    <div class="oto-bar-wrap" id="otoBarWrap" style="display:none;">
        <div class="oto-bar"><div class="oto-bar-dolgu" id="otoBarDolgu"></div></div>
        <div class="oto-bar-text">Otomatik yenileme: <span id="geriSayim">30</span>sn</div>
    </div>
</div>

<script>
    const NAMESPACE = 'mehmetcsr-puanla';
    const INDEX_URL = 'https://raw.githubusercontent.com/mehmetcsr/puanla/main/index.html';
    const YENILEME_SURESI = 30; // saniye

    let kartID = null;
    let yenilemeTimer = null;
    let geriSayimTimer = null;

    window.addEventListener('DOMContentLoaded', () => {
        // URL'den id parametresini al
        const params = new URLSearchParams(window.location.search);
        kartID = params.get('id') || params.get('ID');

        if (kartID && kartID.length === 1) {
            kartID = '0' + kartID;
        }

        if (!kartID) {
            hataGoster('🔍', 'Kart ID Bulunamadı', 'Bu sayfayı açmak için linkin sonunda ?id=01 gibi bir kart numarası olmalı.');
            return;
        }

        veriYukle();
    });

    async function veriYukle() {
        try {
            // Paralel: sayaç + dükkan linki
            const [sayi, dukkanLink] = await Promise.all([
                sayacGetir(kartID),
                dukkanLinkiGetir(kartID)
            ]);

            kartGoster(kartID, sayi, dukkanLink);
            otomatikYenilemeBaslat();

        } catch (err) {
            console.error(err);
            hataGoster('⚠️', 'Bağlantı Hatası', 'Veriler yüklenirken sorun oluştu. Sayfayı yenileyin.');
        }
    }

    async function sayacGetir(id) {
        const apiUrl = `https://api.counterapi.dev/v1/${NAMESPACE}/${id}`;
        
        // Yöntem 1: Direkt istek
        try {
            const resp = await fetch(apiUrl, { cache: 'no-store' });
            if (resp.ok) {
                const data = await resp.json();
                console.log(`Kart ${id} direkt yanıt:`, data);
                return typeof data.count === 'number' ? data.count : 0;
            }
        } catch (e) {
            console.warn(`Kart ${id} direkt istek başarısız, proxy deneniyor...`);
        }

        // Yöntem 2: CORS proxy üzerinden
        try {
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
            const resp = await fetch(proxyUrl, { cache: 'no-store' });
            if (resp.ok) {
                const data = await resp.json();
                console.log(`Kart ${id} proxy yanıtı:`, data);
                return typeof data.count === 'number' ? data.count : 0;
            }
        } catch (e) {
            console.error(`Kart ${id} proxy de başarısız:`, e);
        }

        return 0;
    }

    async function dukkanLinkiGetir(id) {
        try {
            const resp = await fetch(INDEX_URL + '?t=' + Date.now(), { cache: 'no-store' });
            const html = await resp.text();

            // dukkanLinkleri objesinden bu ID'nin linkini bul
            const regex = new RegExp(`"${id}":\\s*"(.*?)"`, 'm');
            const eslesme = html.match(regex);
            return eslesme ? eslesme[1] : null;
        } catch { return null; }
    }

    function linkTipiTespit(link) {
        if (!link) return { tip: 'Bilinmiyor', ikon: '❓' };
        if (link.includes('google.com/local/writereview') || link.includes('google.com/maps'))
            return { tip: 'Google Yorum Linki', ikon: '⭐' };
        if (link.includes('youtube.com') || link.includes('youtu.be'))
            return { tip: 'YouTube Video', ikon: '▶️' };
        if (link.includes('instagram.com'))
            return { tip: 'Instagram', ikon: '📷' };
        if (link.includes('wa.me') || link.includes('whatsapp.com'))
            return { tip: 'WhatsApp', ikon: '💬' };
        return { tip: 'Web Sitesi', ikon: '🔗' };
    }

    function kisaltLink(link) {
        if (!link) return '—';
        try {
            const url = new URL(link);
            let s = url.hostname.replace('www.', '');
            if (url.pathname.length > 1) {
                s += url.pathname.substring(0, 20);
                if (url.pathname.length > 20) s += '…';
            }
            return s;
        } catch { return link.substring(0, 35) + '…'; }
    }

    function kartGoster(id, sayi, dukkanLink) {
        const { tip, ikon } = linkTipiTespit(dukkanLink);
        const kisa = kisaltLink(dukkanLink);
        const anaKart = document.getElementById('anaKart');

        // Sayfa başlığını güncelle
        document.title = `Kart #${id} — ${sayi} Tarama | Puanla!`;

        anaKart.innerHTML = `
            <div class="kart-badge">${id}</div>
            <div class="kart-baslik">Kart #${id}</div>
            <div class="kart-tip"><span class="dot"></span> Aktif</div>

            <div class="sayac-alan">
                <div class="sayac-etiket">Toplam Tarama Sayısı</div>
                <div class="sayac-rakam" id="sayacRakam">${sayi.toLocaleString('tr-TR')}</div>
                <div class="sayac-alt">kez okutuldu</div>
            </div>

            ${dukkanLink ? `
            <div class="link-bilgi">
                <div class="link-ikon">${ikon}</div>
                <div class="link-detay">
                    <div class="link-tip-text">${tip}</div>
                    <div class="link-url" title="${dukkanLink}">${kisa}</div>
                </div>
            </div>
            ` : ''}

            <button class="yenile-btn" id="yenileBtn" onclick="manuelYenile()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                Yenile
            </button>
        `;

        document.getElementById('sonGuncelleme').textContent =
            'Son güncelleme: ' + new Date().toLocaleString('tr-TR');
    }

    async function manuelYenile() {
        const btn = document.getElementById('yenileBtn');
        if (btn) { btn.classList.add('spinning'); }

        const sayi = await sayacGetir(kartID);
        const rakamEl = document.getElementById('sayacRakam');
        if (rakamEl) {
            animasyonluSayi(rakamEl, sayi);
        }

        document.getElementById('sonGuncelleme').textContent =
            'Son güncelleme: ' + new Date().toLocaleString('tr-TR');

        setTimeout(() => { if (btn) btn.classList.remove('spinning'); }, 500);

        // Otomatik yenilemeyi sıfırla
        otomatikYenilemeBaslat();
    }

    function otomatikYenilemeBaslat() {
        // Önceki timerları temizle
        if (yenilemeTimer) clearInterval(yenilemeTimer);
        if (geriSayimTimer) clearInterval(geriSayimTimer);

        const barWrap = document.getElementById('otoBarWrap');
        const barDolgu = document.getElementById('otoBarDolgu');
        const geriSayimEl = document.getElementById('geriSayim');
        barWrap.style.display = 'block';

        let kalan = YENILEME_SURESI;
        barDolgu.style.width = '0%';
        geriSayimEl.textContent = kalan;

        geriSayimTimer = setInterval(() => {
            kalan--;
            geriSayimEl.textContent = kalan;
            barDolgu.style.width = ((YENILEME_SURESI - kalan) / YENILEME_SURESI * 100) + '%';

            if (kalan <= 0) {
                clearInterval(geriSayimTimer);
                manuelYenile();
            }
        }, 1000);
    }

    function animasyonluSayi(el, hedef) {
        const baslangic = parseInt(el.textContent.replace(/\./g, '')) || 0;
        const fark = hedef - baslangic;
        if (fark === 0) { el.textContent = hedef.toLocaleString('tr-TR'); return; }

        const sure = 600;
        const t0 = performance.now();

        function adim(t) {
            const gecen = t - t0;
            const ilerleme = Math.min(gecen / sure, 1);
            const easing = ilerleme === 1 ? 1 : 1 - Math.pow(2, -10 * ilerleme);
            el.textContent = Math.round(baslangic + fark * easing).toLocaleString('tr-TR');
            if (ilerleme < 1) requestAnimationFrame(adim);
        }
        requestAnimationFrame(adim);
    }

    function hataGoster(ikon, baslik, aciklama) {
        document.getElementById('anaKart').innerHTML = `
            <div class="hata-kutu">
                <div class="hata-ikon">${ikon}</div>
                <div class="hata-baslik">${baslik}</div>
                <div class="hata-aciklama">${aciklama}</div>
            </div>
        `;
    }
</script>

</body>
</html>
