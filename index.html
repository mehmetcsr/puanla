<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Yorum Yonlendirme Sistemi</title>
    <style>
        /* Şık ve Profesyonel Yükleniyor Ekranı Tasarımı */
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .yukleniyor-kutu {
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
        .g-mavi { color: #4285f4; }
        .g-kirmizi { color: #ea4335; }
        .g-sari { color: #fabc05; }
        .g-yesil { color: #34a853; }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4285f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .metin {
            color: #475569;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="yukleniyor-kutu">
        <div class="spinner"></div>
        <div class="logo">
            <span class="g-mavi">G</span><span class="g-kirmizi">o</span><span class="g-sari">o</span><span class="g-mavi">g</span><span class="g-yesil">l</span><span class="g-kirmizi">e</span>
        </div>
        <div class="metin">Yorum Sayfasina Yonlendiriliyorsunuz...</div>
    </div>

    <script>
        // =========================================================================
        // 🎯 PANELİNDEN YAPTIĞIN GÜNCELLEMELER OTOMATİK OLARAK BU LİSTEYE YAZILACAK!
        // =========================================================================
        const dukkanLinkleri = {
            "01": "https://search.google.com/local/writereview?placeid=ChIJ",
            "02": "https://www.google.com/search?q=kebab%C3%A7%C4%B1&rlz=1C1GCEA_enTR1027TR1027&oq=kebab%C3%A7%C4%B1&gs_lcrp=EgZjaHJvbWUyBggAEEUYOTIOCAEQABgKGAsYsQMYgAQyCwgCEAAYChgLGIAEMhEIAxAuGAoYCxivARjHARiABDIRCAQQLhgKGAsYrwEYxwEYgAQyCwgFEAAYChgLGIAEMhEIBhAuGAoYCxivARjHARiABDIRCAcQLhgKGAsYrwEYxwEYgAQyEQgIEC4YChgLGK8BGMcBGIAEMgsICRAAGAoYCxiABNIBCDEyMzFqMGo3qAIIsAIB8QV-8hueR_FZ7A&sourceid=chrome&source=chrome.ob&ie=UTF-8"
        };
        // =========================================================================

        function yonlendir() {
            // Tarayıcı adres çubuğundaki ?id=XX parametresini yakalar
            const urlParametreleri = new URLSearchParams(window.location.search);
            const kartID = urlParametreleri.get('id');

            // Eğer ID adreste varsa ve yukarıdaki listemizde tanımlıysa
            if (kartID && dukkanLinkleri[kartID]) {
                window.location.href = dukkanLinkleri[kartID];
            } else {
                // Eğer ID bulunamazsa veya yanlışsa hata mesajı gösterir
                document.querySelector('.metin').innerText = "Gecersiz veya Eksik Kart Numarasi!";
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        // Sayfa açılır açılmaz yönlendirmeyi başlat
        window.onload = yonlendir;
    </script>

</body>
</html>
