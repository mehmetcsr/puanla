<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Google Yorum Yönlendirme Sistemi</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .yukleniyor-kutu {
            text-align: center;
            padding: 20px;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
        .g-mavi { color: #4285f4; }
        .g-kirmizi { color: #ea4335; }
        .g-sari { color: #fabc05; }
        .g-yesil { color: #34a853; }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4285f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .metin {
            color: #475569;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="yukleniyor-kutu">
        <div id="spinner" class="spinner"></div>
        <div class="logo">
            <span class="g-mavi">G</span><span class="g-kirmizi">o</span><span class="g-sari">o</span><span class="g-mavi">g</span><span class="g-yesil">l</span><span class="g-kirmizi">e</span>
        </div>
        <div id="metin" class="metin">Yorum Sayfasına Yönlendiriliyorsunuz...</div>
    </div>

    <script>
        const dukkanLinkleri = {
            "10": "https://www.youtube.com/watch?v=7zp1TbLFPp8",
            "01": "https://search.google.com/local/writereview?placeid=ChIJDX_3YLivyhQR7AmP6ppXl7g",
            "09": "https://www.youtube.com/watch?v=Steiu8j4ZB0&list=PLxSXQclq3muAz7yXMLSTWkrgOJdL-X3IK"
        ,    "02": "https://www.google.com/search?hl=tr-TR&gl=tr&q=TW%C4%B0NS+cafe,+Oru%C3%A7reis,+mah543sok+no1,+34235+Esenler/%C4%B0stanbul&ludocid=12423278304827593015&lsig=AB86z5WW2sAjpjdYe6LHCmjQNeKj#lrd=0x14caaff1675134a9:0xac6859cc0110d137,3"
        };

        function yonlendir() {
            const urlParametreleri = new URLSearchParams(window.location.search);
            let kartID = urlParametreleri.get('id') || urlParametreleri.get('ID');

            if (kartID && kartID.length === 1) {
                kartID = "0" + kartID;
            }

            if (kartID && dukkanLinkleri[kartID]) {
                const hedefLink = dukkanLinkleri[kartID];

                // Sayaç isteğini arka planda (asenkron) tetikle, yanıtı BEKLEME!
                try {
                    fetch(`https://api.counterapi.dev/v1/mehmetcsr-puanla/${kartID}/up`, { keepalive: true }).catch(() => {});
                } catch(e) {}

                // Mobil tarayıcılarda takılmama garantili anında yönlendirme
                window.location.replace(hedefLink);

            } else {
                document.getElementById('spinner').style.display = 'none';
                if (!kartID) {
                    document.getElementById('metin').innerText = "Hata: Kart ID bulunamadı!";
                } else {
                    document.getElementById('metin').innerText = "Hata: " + kartID + " ID'li dükkan bulunamadı!";
                }
            }
        }

        window.onload = yonlendir;
    </script>

</body>
</html>
