<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta etiketleri ile tarayıcıya bu sayfayı asla hafızaya alma diyoruz -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Google Yorum Yonlendirme Sistemi</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .yukleniyor-kutu {
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
        .g-mavi { color: #4285f4; }
        .g-kirmizi { color: #ea4335; }
        .g-sari { color: #fabc05; }
        .g-yesil { color: #34a853; }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4285f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .metin {
            color: #475569;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="yukleniyor-kutu">
        <div class="spinner"></div>
        <div class="logo">
            <span class="g-mavi">G</span><span class="g-kirmizi">o</span><span class="g-sari">o</span><span class="g-mavi">g</span><span class="g-yesil">l</span><span class="g-kirmizi">e</span>
        </div>
        <div class="metin">Yorum Sayfasina Yonlendiriliyorsunuz...</div>
    </div>

    <script>
        // =========================================================================
        // 🎯 PANELİNDEN YAPTIĞIN GÜNCELLEMELER OTOMATİK OLARAK BU LİSTEYE YAZILACAK!
        // =========================================================================
        const dukkanLinkleri = {
            "01": "https://www.google.com/search?q=kebab%C3%A7%C4%B1&rlz=1C1GCEA_enTR1027TR1027&oq=kebab%C3%A7%C4%B1&gs_lcrp=EgZjaHJvbWUyBggAEEUYOTIOCAEQABgKGAsYsQMYgAQyCwgCEAAYChgLGIAEMhEIAxAuGAoYCxivARjHARiABDIRCAQQLhgKGAsYrwEYxwEYgAQyCwgFEAAYChgLGIAEMhEIBhAuGAoYCxivARjHARiABDIRCAcQLhgKGAsYrwEYxwEYgAQyEQgIEC4YChgLGK8BGMcBGIAEMgsICRAAGAoYCxiABNIBCDEyMzFqMGo3qAIIsAIB8QV-8hueR_FZ7A&sourceid=chrome&source=chrome.ob&ie=UTF-8",
            "02": "https://search.google.com/local/writereview?placeid=ChIJ"
        ,    "06": "https://www.google.com/search?sca_esv=b754fa5c8f084eb3&rlz=1C1GCEA_enTR1027TR1027&sxsrf=APpeQnsOrfYtKfdiGJnk_icB-r9NbskiKw:1784334931185&si=APenkKm7iecQ4G6P-TsbSMFKIQtv3EFIqRAFw-i8uEbk55Z-_-UYjYXQ6a8IpDmqW7Avh0Qufzv9dOmtgZUmgFFDoiZp52GUycPjOAITvsgtdHCp4CpBIA8ko3UqjCtwlgK-3UcHcQUkZwykuoz6N6sNV9Mj-JiuRs43yLQoVv1Mwy8laENTWyg%3D&q=Aksa+Kebap+ci%C4%9Fer+Lahmacun+ve+pide+Salonu+Yorumlar&sa=X&ved=2ahUKEwjv7-7N_dqVAxWgdPEDHSOZHZMQ0bkNegQIOxAF&biw=1920&bih=919&dpr=1"
        };
        // =========================================================================

        function yonlendir() {
            const urlParametreleri = new URLSearchParams(window.location.search);
            const kartID = urlParametreleri.get('id');

            if (kartID && dukkanLinkleri[kartID]) {
                // 🎯 Orijinal temiz linki hiç bozmadan direkt yönlendiriyoruz kanka.
                // Önbelleği yukarıdaki <meta> etiketleri zaten hallediyor.
                window.location.href = dukkanLinkleri[kartID];
            } else {
                document.querySelector('.metin').innerText = "Gecersiz veya Eksik Kart Numarasi!";
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        window.onload = yonlendir;
    </script>

</body>
</html>
